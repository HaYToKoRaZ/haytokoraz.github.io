<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projelerim | Windows 98 Edition</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .explorer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            padding: 20px;
            background: white;
            border: 2px solid;
            border-color: var(--win98-dark-grey) var(--win98-white) var(--win98-white) var(--win98-dark-grey);
            height: 300px;
            overflow-y: auto;
        }

        .folder-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            color: black;
            font-size: 11px;
        }

        .folder-icon img {
            width: 32px;
            height: 32px;
            margin-bottom: 5px;
        }

        .folder-icon:hover span {
            background: var(--win98-blue);
            color: white;
        }

        .explorer-toolbar {
            display: flex;
            gap: 10px;
            padding: 5px;
            border-bottom: 1px solid var(--win98-dark-grey);
            margin-bottom: 5px;
            font-size: 11px;
        }

        .toolbar-item {
            padding: 2px 5px;
            cursor: default;
        }

        .toolbar-item:hover {
            box-shadow: inset 1px 1px 0 var(--win98-white), inset -1px -1px 0 var(--win98-dark-grey);
        }
    </style>
</head>

<body>
    <div class="desktop"></div>

    <div class="window" style="top: 10%; left: 10%; width: 80%; min-height: 450px;">
        <div class="title-bar">
            <div class="title-bar-text">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" width="16" height="16" alt="">
                C:\Belgelerim\Projelerim
            </div>
            <div class="title-bar-controls">
                <button class="win-btn" onclick="location.href='index.html'">_</button>
                <button class="win-btn">1</button>
                <button class="win-btn" onclick="location.href='index.html'">r</button>
            </div>
        </div>
        
        <div class="explorer-toolbar">
            <div class="toolbar-item" onclick="location.href='index.html'">Dosya</div>
            <div class="toolbar-item">Düzen</div>
            <div class="toolbar-item">Görünüm</div>
            <div class="toolbar-item">Yardım</div>
        </div>

        <div class="window-content" style="padding: 10px;">
            <div class="explorer-grid">
                <a href="#" class="folder-icon">
                    <img src="https://win98icons.alexmeub.com/icons/png/executable-0.png" alt="">
                    <span>Old Cold Freezer.exe</span>
                </a>
                <a href="#" class="folder-icon">
                    <img src="https://win98icons.alexmeub.com/icons/png/executable-0.png" alt="">
                    <span>Old ExtSwitch.exe</span>
                </a>
                <a href="#" class="folder-icon">
                    <img src="https://win98icons.alexmeub.com/icons/png/executable-0.png" alt="">
                    <span>Hayto New Tab.exe</span>
                </a>
                <a href="#" class="folder-icon">
                    <img src="https://win98icons.alexmeub.com/icons/png/executable-0.png" alt="">
                    <span>Old Local Tab.exe</span>
                </a>
            </div>
            
            <div style="margin-top: 20px; font-size: 11px; border: 1px solid var(--win98-dark-grey); padding: 5px; background: #eee;">
                <b>Dosya Bilgisi:</b> Seçilen öğenin detayları burada görünecektir.
            </div>
            
            <div style="margin-top: 10px; text-align: right;">
                <button class="classic-btn" onclick="location.href='index.html'">Kapat</button>
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <div class="start-button" onclick="location.href='index.html'">
            <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" alt="">
            Başlat
        </div>
        <div class="taskbar-divider"></div>
        <div class="task-item" style="border-color: var(--win98-dark-grey) var(--win98-white) var(--win98-white) var(--win98-dark-grey); box-shadow: none; background: #ddd;">
            <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" width="16" height="16" style="margin-right: 5px;">
            Projelerim
        </div>
        
        <div class="systray">
            <span style="font-weight: bold; border-right: 1px solid var(--win98-dark-grey); padding-right: 5px; margin-right: 5px;">SYSTEM_READY // 1980</span>
            <img src="https://win98icons.alexmeub.com/icons/png/loudspeaker_rays-0.png" width="16" alt="">
            <span id="clock">00:00</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
